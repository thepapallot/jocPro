<!doctype html>
<html>
<head>
    <title>Intro Video</title>
</head>
<body>
    <script>
        const sceneMap = {
            1: "scene_video1_test",
            2: "scene_video2_test",
            3: "scene_video3_test",
            4: "scene_video4_test",
            5: "scene_video5_test",
            6: "scene_video6_test",
            8: "scene_video8_test",
            9: "scene_video9_test",
            10: "scene_video10_test"
        };

        const idx = {{ idx_puzzle_id|int }};
        const sceneId = sceneMap[idx];
        const puzzleId = {{ puzzle_id|tojson }};
        const nextUrl = puzzleId ? {{ url_for('puzzle', puzzle_id=0)|replace('0', '__PUZZLE_ID__')|tojson }}.replace('__PUZZLE_ID__', puzzleId) : {{ url_for('welcome')|tojson }};

        if (sceneId) {
            const target = `{{ url_for('scene_player') }}?scene=${encodeURIComponent(sceneId)}&next=${encodeURIComponent(nextUrl)}`;
            window.location.replace(target);
        } else {
            window.location.replace(nextUrl);
        }
    </script>
</body>
</html>
