{% extends "base.html" %}

{% block title %}Puzzle 1{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/puzzle1.css') }}">
{% endblock %}

{% block top_right %}
<div id="timer">02:00</div>
{% endblock %}

{% block puzzle_content %}
<div id="objective-panel">
    <div id="round-indicator" aria-label="Fase actual">
        <span class="phase-step is-active"></span>
        <span class="phase-link"></span>
        <span class="phase-step"></span>
    </div>

    <div id="objective-formula">
        <div class="formula-item" id="formula-left">
            <img
                id="formula-left-image"
                src="{{ url_for('static', filename='images/shared/gameplay/token_card.png') }}"
                alt="Elemento 1"
            >
            <span id="formula-left-value" class="formula-value">--</span>
        </div>

        <span>+</span>

        <div class="formula-item" id="formula-right">
            <img
                id="formula-right-image"
                src="{{ url_for('static', filename='images/shared/gameplay/terminal_box.png') }}"
                alt="Elemento 2"
            >
            <span id="formula-right-value" class="formula-value">--</span>
        </div>

        <span>=</span>

        <span id="formula-result-value" class="formula-result-value">--</span>
    </div>

    <div id="objective-message" aria-live="polite"></div>
</div>

<div id="solved-container"></div>

<!-- Solved banner -->
<div id="p1-solved-banner" class="p1-solved-banner hidden">
        <div class="p1-solved-text">Puzle completat!</div>
</div>

<div id="puzzle-container" class="round-1"></div>
{% endblock %}

{% block extra_js %}
<script>
    window.NEXT_PUZZLE_ID = {{ next_puzzle_id|tojson|safe }};
</script>
<script src="{{ url_for('static', filename='js/puzzle1.js') }}"></script>
{% endblock %}
