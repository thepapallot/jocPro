{% extends "base.html" %}

{% block title %}Puzzle 12{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/puzzle12.css') }}">
{% endblock %}

{% block top_right %}
<div id="final-top-hud">
    <div id="timer-overlay">00:00</div>
</div>
{% endblock %}

{% block puzzle_content %}
<div id="final-shell">
    <section id="final-stage" class="final-panel">
        <div id="final-levels">
            <div class="final-level" data-round-card="1">
                <span class="final-level-value">1</span>
            </div>
            <div class="final-level" data-round-card="2">
                <span class="final-level-value">2</span>
            </div>
            <div class="final-level" data-round-card="3">
                <span class="final-level-value">3</span>
            </div>
            <div class="final-level" data-round-card="4">
                <span class="final-level-value">4</span>
            </div>
        </div>

        <div id="final-main">
            <div id="final-viewport-wrap">
                <div id="final-viewport">
                    <img id="fase-gif" src="" alt="Secuencia final" style="display:none;">
                    <img id="wrong-img" src="{{ url_for('static', filename='images/puzzle12/wrong.png') }}" alt="wrong" style="display:none;">
                    <img id="good-img" src="{{ url_for('static', filename='images/puzzle12/good.png') }}" alt="good" style="display:none;">

                    <div id="wait-screen">
                        <img id="wait-img" src="{{ url_for('static', filename='images/puzzle12/wait.png') }}" alt="wait">
                        <div id="countdown-number"></div>
                    </div>
                </div>
            </div>
        </div>
    </section>
</div>
{% endblock %}

{% block extra_js %}
<script>
    window.NEXT_PUZZLE_ID = {{ next_puzzle_id|tojson|safe }};
</script>
<script>
window.PUZZLE_FINAL_OUTRO_URL = "{{ url_for('scene_player') }}?scene=scene_outro_game&next={{ url_for('final_loop') | urlencode }}";
</script>
<script src="{{ url_for('static', filename='js/puzzle12.js') }}"></script>
{% endblock %}

<!-- Solved banner -->
<div id="p12-solved-banner" class="p12-solved-banner hidden">
        <div class="p12-solved-text">Puzle completat!</div>
</div>
