<!doctype html>
<html>
<head>
    <title>Intro Video</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background: black;
        }
        video {
            width: 100vw;
            height: 100vh;
            object-fit: cover;
        }
        .video-start-overlay {
            position: fixed;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.72);
            color: white;
            font-family: Arial, sans-serif;
            font-size: 1.25rem;
            letter-spacing: 0.04em;
            cursor: pointer;
            z-index: 10;
        }
        .video-start-overlay.visible {
            display: flex;
        }
    </style>
</head>
<body>
    <video id="intro" width="800" playsinline preload="auto">
        <source src="{{ url_for('static', filename='videos/JocsSuperats/JocSuperat' + idx_puzzle_id|string + '.mp4') }}" type="video/mp4">
        Your browser does not support the video tag.
    </video>
    <button id="video-start-overlay" class="video-start-overlay" type="button">
        Clica para reproducir el video
    </button>
    <script>
        const video = document.getElementById('intro');
        const overlay = document.getElementById('video-start-overlay');
        const nextPuzzleIndexStr = "{{ idx_puzzle_id }}"; // current (1-based) solved puzzle position
        const currentIndex = nextPuzzleIndexStr ? parseInt(nextPuzzleIndexStr, 10) : null;
        const nextPuzzleIndex = (currentIndex === null || Number.isNaN(currentIndex)) ? null : (currentIndex + 1);
        const isFinal = {{ 'true' if final else 'false' }};
        const provaFinal = {{ 'true' if prova_final else 'false' }};
        console.log("Current puzzle index:", currentIndex);
        console.log("Next puzzle index:", nextPuzzleIndex);

        async function requestVideoFullscreen() {
            try {
                if (video.requestFullscreen) {
                    await video.requestFullscreen();
                } else if (video.webkitRequestFullscreen) {
                    video.webkitRequestFullscreen();
                } else if (video.msRequestFullscreen) {
                    video.msRequestFullscreen();
                }
            } catch (error) {
                console.debug('Fullscreen blocked:', error);
            }
        }

        async function startVideo({ fromUserGesture = false } = {}) {
            try {
                overlay.classList.remove('visible');
                await video.play();
                if (fromUserGesture) {
                    await requestVideoFullscreen();
                }
            } catch (error) {
                overlay.classList.add('visible');
                console.debug('Video playback blocked:', error);
            }
        }

        overlay.addEventListener('click', () => startVideo({ fromUserGesture: true }));

        video.addEventListener('click', () => {
            if (video.paused) {
                startVideo({ fromUserGesture: true });
                return;
            }

            requestVideoFullscreen();
        });

        video.onended = function() {
            if (nextPuzzleIndex === null || Number.isNaN(nextPuzzleIndex)) {
                window.location.href = "{{ url_for('welcome') }}?redirect_flag=start";
            } else if (isFinal) {
                if (provaFinal) {
                    const indexFinal = -1;
                    window.location.href = "{{ url_for('welcome') }}?redirect_flag=indexFinal";
                } else {
                    window.location.href = "{{ url_for('final') }}";
                }
            } else {
                window.location.href = "{{ url_for('welcome') }}?redirect_flag=puzzle" + nextPuzzleIndex;
            }
        };

        startVideo();
    </script>
</body>
</html>
