<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Puzzle{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}">
    {% block extra_css %}{% endblock %}
</head>
<body>

    <div id="game-frame"></div>

    <div id="top-area">
        <div id="top-left" class="top-cell">
            <span class="level-title">
                {% block level_title %}NIVEL {{ current_level if current_level else 1 }}{% endblock %}
            </span>
        </div>

        <div id="top-center" class="top-cell">
            <img
                id="top-video"
                src="{{ url_for('static', filename='images/piramidetrans.png') }}"
                alt="Piramide"
            >
        </div>

        <div id="top-right" class="top-cell">
            {% block top_right %}
            <div id="timer">02:00</div>
            {% endblock %}
        </div>
    </div>

    <div id="bottom-area">
        {% block puzzle_content %}{% endblock %}
    </div>

    {% block extra_js %}{% endblock %}
</body>
</html>
