<!doctype html>
<html>
<head>
    <title>Intro Video</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background: black;
        }
        #intro-stage {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 1920px;
            height: 1080px;
            overflow: hidden;
            transform-origin: center center;
        }
        #intro-stage video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
    </style>
</head>
<body>
    <div id="intro-stage">
        <video id="intro" width="800" autoplay>
            <source src="{{ url_for('static', filename='videos/Video_inicial.mp4') }}" type="video/mp4">
            Your browser does not support the video tag.
        </video>
    </div>
    <script>
        const video = document.getElementById('intro');
        const stage = document.getElementById('intro-stage');

        // Request fullscreen when the video starts playing
        video.addEventListener('play', () => {
            if (video.requestFullscreen) {
                video.requestFullscreen();
            } else if (video.webkitRequestFullscreen) { // Safari
                video.webkitRequestFullscreen();
            } else if (video.msRequestFullscreen) { // IE11
                video.msRequestFullscreen();
            }
        });

        video.onended = function() {
            const next = {{ url_for('welcome', redirect_flag='puzzle1')|tojson }};
            const target = `{{ url_for('scene_player') }}?scene=scene_intro_game&next=${encodeURIComponent(next)}`;
            window.location.replace(target);
        };

        function updateStageScale() {
            if (!stage) return;
            const scale = Math.min(
                window.innerWidth / 1920,
                window.innerHeight / 1080
            );
            stage.style.transform = `translate(-50%, -50%) scale(${scale})`;
        }

        window.addEventListener('resize', updateStageScale, { passive: true });
        updateStageScale();
    </script>
</body>
</html>
