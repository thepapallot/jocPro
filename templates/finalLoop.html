<!doctype html>
<html>
<head>
    <title>Final Loop</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: black;
        }

        video {
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            display: block;

    <video autoplay muted loop playsinline preload="auto">

    </video>
</body>
</html>
