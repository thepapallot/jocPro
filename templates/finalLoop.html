<!doctype html>
<html>
<head>
    <title>Final Loop</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: black;
        }

        #final-stage {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 1920px;
            height: 1080px;
            overflow: hidden;
            transform-origin: center center;
        }

        #final-stage video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            background: black;
        }
    </style>
</head>
<body>
    <div id="final-stage">
        <video autoplay muted loop playsinline preload="auto">
            <source src="{{ url_for('static', filename='videos/Video_inicial.mp4') }}" type="video/mp4">
            Your browser does not support the video tag.
        </video>
    </div>
    <script>
        const stage = document.getElementById('final-stage');
        function updateStageScale() {
            if (!stage) return;
            const scale = Math.min(
                window.innerWidth / 1920,
                window.innerHeight / 1080
            );
            stage.style.transform = `translate(-50%, -50%) scale(${scale})`;
        }
        window.addEventListener('resize', updateStageScale, { passive: true });
        updateStageScale();
    </script>
</body>
</html>
