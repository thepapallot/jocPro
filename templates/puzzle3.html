{% extends "base.html" %}

{% block title %}Puzzle 3{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/puzzle3.css') }}">
{% endblock %}

{% block top_right %}
<div id="streak-panel">
    <div class="hud-label">Progreso</div>
    <div id="streak">1/10</div>
</div>
{% endblock %}

{% block puzzle_content %}
<div id="puzzle3-shell">
    <section id="quiz-dashboard" class="quiz-panel">
        <div class="panel-head">
            <div id="box-headmark">
                <img
                    id="box-headmark-icon"
                    src="{{ url_for('static', filename='images/shared/gameplay/terminal_box.png') }}"
                    alt="Caja"
                >
            </div>
            <div id="player-summary">0/10</div>
        </div>

        <div id="player-status"></div>

        <div id="feedback" aria-live="polite"></div>
    </section>

    <section id="quiz-stage" class="quiz-panel">
        <div id="security-panel">
            <div id="security-levels">
                <div class="security-level" data-level="1">
                    <div class="security-level-top">
                        <span class="security-target">3</span>
                    </div>
                    <div class="security-track"><div class="security-fill"></div></div>
                </div>

                <div class="security-level" data-level="2">
                    <div class="security-level-top">
                        <span class="security-target">6</span>
                    </div>
                    <div class="security-track"><div class="security-fill"></div></div>
                </div>

                <div class="security-level" data-level="3">
                    <div class="security-level-top">
                        <span class="security-target">10</span>
                    </div>
                    <div class="security-track"><div class="security-fill"></div></div>
                </div>
            </div>
        </div>

        <div id="question-area">
            <div id="question-text"></div>
        </div>

        <div id="answer-area"></div>
    </section>
</div>
{% endblock %}

{% block extra_js %}
<script>
    window.NEXT_PUZZLE_ID = {{ next_puzzle_id|tojson|safe }};
</script>
<script src="{{ url_for('static', filename='js/puzzle3.js') }}"></script>
{% endblock %}

{% block after_body %}
<div id="p3-solved-banner" class="p3-solved-banner hidden">
    <div class="p3-solved-text">NIVEL COMPLETADO</div>
</div>
{% endblock %}
