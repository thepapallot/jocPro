<!DOCTYPE html>
<html>
<head>
    <title>Welcome</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background: black;
        }
        .overlay-image {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            max-width: 80%;
            max-height: 80%;
            z-index: 2;
            display: none; /* shown on first click */
        }
        #welcome-stage {
            position: relative;
            width: 1920px;
            height: 1080px;
            overflow: hidden;
            transform-origin: center center;
            position: absolute;
            top: 50%;
            left: 50%;
        }
        #welcome-stage video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0; left: 0;
            z-index: 1;
        }
    </style>
</head>
<body>
    <div id="welcome-stage">
        <video id="welcome-video" autoplay loop muted>
            <source src="{{ url_for('static', filename='videos/Video_inicial.mp4') }}" type="video/mp4">
            Your browser does not support the video tag.
        </video>
        <img id="overlay" class="overlay-image" src="{{ url_for('static', filename='images/text_dividios.png') }}" alt="overlay">
        <audio id="overlay-audio" src="{{ url_for('static', filename='audios/inicial/ESP_dividios.mp3') }}"></audio>
    </div>
    <script>
        const stage = document.getElementById('welcome-stage');
        const redirectFlag = "{{ redirect_flag }}";
        const idxStr = "{{ idx }}";  // will be empty string if None
        const puzzleIdx = idxStr ? parseInt(idxStr, 10) : null;

        const overlayImg = document.getElementById('overlay');
        const overlayAudio = document.getElementById('overlay-audio');

        function updateStageScale() {
            if (!stage) return;
            const scale = Math.min(
                window.innerWidth / 1920,
                window.innerHeight / 1080
            );
            stage.style.transform = `translate(-50%, -50%) scale(${scale})`;
        }

        if (redirectFlag === 'indexFinal') {
            document.body.addEventListener('click', () => {
                const form = document.createElement('form');
                form.method = 'POST';
                form.action = `/videoJocFinal`;
                document.body.appendChild(form);
                form.submit();
            });
        } else if (redirectFlag && redirectFlag.startsWith('puzzle') && puzzleIdx !== null) {    
            document.body.addEventListener('click', () => {
                const form = document.createElement('form');
                form.method = 'POST';
                form.action = `/videoPuzzles/${puzzleIdx}`;
                document.body.appendChild(form);
                form.submit();
            });
        } else {
            // Default "start" flow: first click plays audio + shows image, second click goes to intro
            let firstClickDone = false;
            document.body.addEventListener('click', () => {
                if (!firstClickDone) {
                    firstClickDone = true;
                    try { overlayAudio.currentTime = 0; overlayAudio.play(); } catch {}
                    overlayImg.style.display = 'block';
                    return;
                }
                const next = {{ url_for('welcome', redirect_flag='puzzle1')|tojson }};
                const target = `{{ url_for('scene_player') }}?scene=scene_intro_game&next=${encodeURIComponent(next)}`;
                window.location.replace(target);
            });
        }

        window.addEventListener('resize', updateStageScale, { passive: true });
        updateStageScale();
    </script>
</body>
</html>
